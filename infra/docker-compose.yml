services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-royd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-royd_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-royd}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-royd}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/backend.Dockerfile
    environment:
      ENV: dev
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-royd}:${POSTGRES_PASSWORD:-royd_dev_pw}@postgres:5432/${POSTGRES_DB:-royd}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-to-32-chars-pls}
      HEMIS_USE_MOCK: "true"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      STORAGE_DIR: /app/storage/uploads
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend:/app
      - backend-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    command: ["/app/entrypoint.sh"]

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ../frontend:/app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  backend-storage:
